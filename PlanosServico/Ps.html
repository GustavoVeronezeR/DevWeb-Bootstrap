<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de Serviços</title>
    <link href="css/reset.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container mt-5">
        <h1 class="text-center mb-4">Ecolha seu Plano</h1>
        <div class="row">
            <!-- Card 1-->
            <div class="col-md-4 mb-4">
                <div class="card text-center h-100">
                    <div class="card-body">
                        <h3 class="card-title">Básico</h3>
                        <h4 class="card-text">R$ 19,90/mês </h4>
                    </div>

                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">Qualidade SD</li>
                        <li class="list-group-item">1 tela</li>
                        <li class="list-group-item">Acesso ilimitado</li>
                    </ul>

                    <div class="card-body">
                        <a href="#" class="btn btn-danger">Assinar</a>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-md-4 mb-4">
                <div class="card text-center h-100 border-danger">
                    <div class="card-body">
                        <h3 class="card-title">Padrão</h3>
                        <h4 class="card-text">R$ 39,90/mês </h4>
                    </div>

                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">Qualidade HD</li>
                        <li class="list-group-item">2 telas simultanêas</li>
                        <li class="list-group-item">Download disponível</li>
                    </ul>

                    <div class="card-body">
                        <a href="#" class="btn btn-danger">Assinar</a>
                    </div>
                </div>
            </div>    

            <!-- Card 3 -->
            <div class="col-md-4 mb-4">
                <div class="card text-center h-100">
                    <div class="card-body">
                        <h3 class="card-title">Premium</h3>
                        <h4 class="card-text">R$ 59,90/mês </h4>
                    </div>

                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">Qualidade 4K + HDR</li>
                        <li class="list-group-item">4 telas simultâneas</li>
                        <li class="list-group-item">Áudio imersivo</li>
                    </ul>

                    <div class="card-body">
                        <a href="#" class="btn btn-danger">Assinar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
